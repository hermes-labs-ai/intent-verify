name: intent-verify

on:
  pull_request:
  push:

jobs:
  verify-intent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install intent-verify
      - run: intent-verify check --spec INTENT.md --repo .
